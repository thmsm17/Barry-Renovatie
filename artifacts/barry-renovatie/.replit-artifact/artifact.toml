kind = "web"
previewPath = "/"
title = "Barry Renovatie en Klussenbedrijf"
version = "1.0.0"
id = "artifacts/barry-renovatie"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21933
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/barry-renovatie run dev"

[services.env]
PORT = "21933"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/barry-renovatie", "run", "build"]
publicDir = "artifacts/barry-renovatie/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
